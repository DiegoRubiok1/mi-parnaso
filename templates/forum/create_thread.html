{% extends "base.html" %}

{% block title %}Crear tema - Foro - Mi Parnaso{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <a href="{% url 'forum:thread-list' %}" class="btn btn-secondary btn-sm mb-3">&larr; Volver al foro</a>

        <div class="card">
            <div class="card-body">
                <h2 class="card-title mb-4">Crear nuevo tema</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_title" class="form-label">Título</label>
                        <input type="text" name="title" id="id_title" class="form-control" placeholder="Título del tema" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_content" class="form-label">Contenido</label>
                        <textarea name="content" id="id_content" class="form-control" rows="6" placeholder="Escribe tu mensaje..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Crear tema</button>
                    <a href="{% url 'forum:thread-list' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
