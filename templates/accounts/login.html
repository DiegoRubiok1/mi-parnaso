{% extends "base.html" %}

{% block title %}Iniciar sesión - Mi Parnaso{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title mb-4">Iniciar sesión</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    <div class="text-end mt-2">
                        <small><a href="{% url 'accounts:password_reset' %}">¿Has olvidado tu contraseña?</a></small>
                    </div>
                </form>
                <hr>
                <p class="text-center">¿No tienes cuenta? <a href="{% url 'accounts:register' %}">Regístrate</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
