<div id="subscription-panel">
    {% if messages %}
        <div id="subscription-messages">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show small py-2" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" style="padding: 0.5rem;"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}
    <div class="d-grid gap-2">
        <button class="btn btn-sm {% if profile.subscribe_to_blog %}btn-success{% else %}btn-outline-primary{% endif %}"
                hx-post="{% url 'accounts:toggle-subscription' 'blog' %}"
                hx-target="#subscription-panel"
                hx-swap="outerHTML">
            <i class="bi {% if profile.subscribe_to_blog %}bi-bell-fill{% else %}bi-bell{% endif %}"></i>
            {% if profile.subscribe_to_blog %}Suscrito al Blog{% else %}Suscribirme al Blog{% endif %}
        </button>

        <button class="btn btn-sm {% if profile.subscribe_to_forum %}btn-success{% else %}btn-outline-primary{% endif %}"
                hx-post="{% url 'accounts:toggle-subscription' 'forum' %}"
                hx-target="#subscription-panel"
                hx-swap="outerHTML">
            <i class="bi {% if profile.subscribe_to_forum %}bi-bell-fill{% else %}bi-bell{% endif %}"></i>
            {% if profile.subscribe_to_forum %}Suscrito al Foro{% else %}Suscribirme al Foro{% endif %}
        </button>
    </div>
    {% if not profile.subscribe_to_blog and not profile.subscribe_to_forum %}
        <p class="text-muted small mt-2 mb-0">Recibe un correo cuando haya novedades.</p>
    {% endif %}
</div>
